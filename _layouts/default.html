<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site.title }}{% if page.title and page.title != 'About' %} | {{ page.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="icon" type="image/png" href="{{ '/assets/images/setswipe-logo.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="wrap header-inner">
          <a class="brand" href="{{ '/' | relative_url }}">
            <img
              class="brand-logo"
              src="{{ '/assets/images/setswipe-logo.png' | relative_url }}"
              alt="SetSwipe logo"
            >
            <span class="brand-text">SetSwipe</span>
          </a>

          <nav class="site-nav" aria-label="Primary navigation">
            <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>About</a>
            <a href="{{ '/team/' | relative_url }}" {% if page.url == '/team/' %}aria-current="page"{% endif %}>Team</a>
            <a href="{{ '/download/' | relative_url }}" {% if page.url == '/download/' %}aria-current="page"{% endif %}>Download</a>
            <a href="{{ '/tutorial/' | relative_url }}" {% if page.url == '/tutorial/' %}aria-current="page"{% endif %}>Tutorial</a>
          </nav>
        </div>
      </header>

      <main class="wrap page-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="wrap footer-inner">
          <p>&copy; 2026 SetSwipe</p>
          <p><a href="{{ '/team/' | relative_url }}">Contact</a></p>
        </div>
      </footer>
    </div>
  </body>
</html>
